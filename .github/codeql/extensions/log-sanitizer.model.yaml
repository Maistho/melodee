# CodeQL Model Extension for Melodee LogSanitizer
# This file tells CodeQL to recognize LogSanitizer.Sanitize() as a sanitizer
# for log-forging vulnerabilities.
#
# The "value" kind (instead of "taint") indicates that data flows through the method
# but taint does NOT propagate. This effectively makes the method a sanitizer/barrier.
#
# Reference: https://codeql.github.com/docs/codeql-language-guides/customizing-library-models-for-csharp/

extensions:
  - addsTo:
      pack: codeql/csharp-all
      extensible: summaryModel
    data:
      # LogSanitizer.Sanitize(string?) sanitizes log input by replacing newlines
      # Using "value" kind means data flows but taint is cleansed
      - ["Melodee.Common.Utility", "LogSanitizer", False, "Sanitize", "(System.String)", "", "Argument[0]", "ReturnValue", "value", "manual"]
      # LogSanitizer.SanitizeObject(object?) sanitizes log input
      - ["Melodee.Common.Utility", "LogSanitizer", False, "SanitizeObject", "(System.Object)", "", "Argument[0]", "ReturnValue", "value", "manual"]
      # LogSanitizer.MaskEmail(string?) masks sensitive data
      - ["Melodee.Common.Utility", "LogSanitizer", False, "MaskEmail", "(System.String)", "", "Argument[0]", "ReturnValue", "value", "manual"]
      # LogSanitizer.MaskIdentifier(string?, int) masks sensitive data
      - ["Melodee.Common.Utility", "LogSanitizer", False, "MaskIdentifier", "(System.String,System.Int32)", "", "Argument[0]", "ReturnValue", "value", "manual"]
