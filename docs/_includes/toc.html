<script
  src="{{ site.baseurl }}/assets/js/jquery-3.3.1/jquery-3.3.1.min.js"
  integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8= sha256-T+aPohYXbm0fRYDpJLr+zJ9RmYTswGsahAoIsNiMld4="
  crossorigin="anonymous"></script>

<script>
// Helper function to escape HTML to prevent XSS
function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

$(document).ready(function() {

    var toc = $('#TOC');

    // Select each header
    sections = $('.td-content h1');
        $.each(sections, function(idx, v) {
            section = $(v);
            var div_id = $(section).attr('id');
            var div_text = section.text().split('¶')[0];
            var parent = $("#" + div_id)
            // Use text() instead of html() to prevent XSS, and escape attributes
            var li = $('<li>', {
                id: 'link_' + div_id,
                'class': 'md-nav__item'
            });
            var a = $('<a>', {
                'class': 'md-nav__link',
                href: '#' + encodeURIComponent(div_id),
                title: div_text
            }).text(div_text);
            li.append(a);
            $(toc).append(li);

            // Add section code to subnavigation
            var children = $('<nav class="md-nav"><ul class="md-nav__list"></nav></ul>')
            var contenders = $("#" + div_id).nextUntil("h1");
            $.each(contenders, function(idx, contender){
               if($(contender).is('h2') || $(contender).is('h3')) {
                   var contender_id = $(contender).attr('id');
                   var contender_text = $(contender).text().split('¶')[0];
                   // Use jQuery object construction to prevent XSS
                   var childLi = $('<li>', {'class': 'md-nav__item'});
                   var childA = $('<a>', {
                       'class': 'md-nav__link',
                       href: '#' + encodeURIComponent(contender_id),
                       title: contender_text
                   }).text(contender_text);
                   childLi.append(childA);
                   children.append(childLi);
                }
             })
             $("#link_" + div_id).append(children);
        });
    });
</script>
